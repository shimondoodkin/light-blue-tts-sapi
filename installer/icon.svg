<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E1F5FE;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" />
  <!-- Sound wave arcs (speech/TTS symbol) -->
  <g transform="translate(128,128)" stroke="url(#wave)" fill="none" stroke-linecap="round">
    <!-- Inner arc -->
    <path d="M 20,-30 Q 45,0 20,30" stroke-width="10" />
    <!-- Middle arc -->
    <path d="M 40,-50 Q 75,0 40,50" stroke-width="10" />
    <!-- Outer arc -->
    <path d="M 60,-70 Q 105,0 60,70" stroke-width="10" />
  </g>
  <!-- Hebrew letter Alef stylized -->
  <text x="95" y="165" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">&#x05D0;</text>
</svg>
