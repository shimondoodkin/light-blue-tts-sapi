name: Build & App Setup

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the asset to (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer output directory
        run: mkdir -p target/installer
        shell: bash

      - name: Build NSIS app installer
        shell: cmd
        working-directory: installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightBlue-TTS-SAPI-Setup
          path: target/installer/LightBlue-TTS-SAPI-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: target/installer/LightBlue-TTS-SAPI-Setup.exe
          make_latest: true
          generate_release_notes: true
          body: |
            ## LightBlue Hebrew TTS — Windows SAPI 5 Voice Engine

            ### Downloads

            | File | Description |
            |------|-------------|
            | **LightBlue-TTS-SAPI-Setup.exe** | App installer (DLL, CLI tools, DirectML runtime) |
            | **LightBlue-TTS-SAPI-Models.exe** | ONNX models (required, install separately) |
            | **LightBlue-TTS-SAPI-ORT-CUDA.exe** | ONNX Runtime CUDA — CUDA/TensorRT acceleration (optional) |
            | **LightBlue-TTS-SAPI-ORT-OpenVINO.exe** | ONNX Runtime OpenVINO — Intel CPU/GPU/NPU acceleration (optional) |

            > **Models and runtime installers** are uploaded separately via manual workflows.
            > If they are not yet attached to this release, check back shortly or see [all releases](https://github.com/shimondoodkin/light-blue-tts-sapi/releases).

            ---

            ### Install — Step 1: App + Runtime

            Download and run **LightBlue-TTS-SAPI-Setup.exe** — installs the TTS engine DLL, CLI tools, and the default DirectML runtime (works on all GPUs including AMD, Intel, NVIDIA via Windows ML).

            ### Install — Step 2: Models

            Download and run **LightBlue-TTS-SAPI-Models.exe** — installs the ONNX neural network models into the app folder. **Required.**

            ### Install — Step 3: Pick an Accelerator (optional)

            The default DirectML/WinML runtime works out of the box. For better performance you can replace it with a vendor-specific runtime:

            | Runtime | Best for | Prerequisites |
            |---------|----------|---------------|
            | **DirectML** (default) | Any GPU — AMD, Intel, NVIDIA | None (included) |
            | **OpenVINO** | Intel CPUs, Intel GPUs, Intel NPUs | Run **LightBlue-TTS-SAPI-ORT-OpenVINO.exe** (after app setup) |
            | **CUDA / TensorRT** | NVIDIA GPUs (fastest) | Install [CUDA 12.x](https://developer.nvidia.com/cuda-toolkit-archive) + [cuDNN 9.x](https://developer.nvidia.com/cudnn-archive), then run **LightBlue-TTS-SAPI-ORT-CUDA.exe** (after app setup) |

            After installing a runtime, select the matching voice variant (e.g. "GPU") in Windows speech settings.

            ---

            ### Voice Variants

            Each voice (male "Shaul" / female "Rotem") has multiple quality presets:
            - **4 steps** — fastest, lower quality
            - **8 steps** — good balance (default)
            - **32 steps** — high quality
            - **64 steps** — best quality, slowest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
