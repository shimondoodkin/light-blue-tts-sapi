name: Build & App Setup

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer output directory
        run: mkdir -p target/installer
        shell: bash

      - name: Build NSIS app installer
        shell: cmd
        working-directory: installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightBlue-TTS-Setup
          path: target/installer/LightBlue-TTS-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/installer/LightBlue-TTS-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
