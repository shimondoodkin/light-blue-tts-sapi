name: Build & App Setup

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installer output directory
        run: mkdir -p target/installer
        shell: bash

      - name: Build NSIS app installer
        shell: cmd
        working-directory: installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightBlue-TTS-Setup
          path: target/installer/LightBlue-TTS-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/installer/LightBlue-TTS-Setup.exe
          generate_release_notes: true
          body: |
            ## LightBlue Hebrew TTS — Windows SAPI 5 Voice Engine

            ### Downloads

            | File | Description |
            |------|-------------|
            | **LightBlue-TTS-Setup.exe** | App installer (DLL, CLI tools, DirectML runtime) |
            | **LightBlue-TTS-Models.exe** | ONNX models (required, install separately) |
            | **LightBlue-TTS-ORT-GPU.exe** | ONNX Runtime GPU — for CUDA/TensorRT (optional) |

            > **Models and ORT GPU installers** are uploaded separately via manual workflows.
            > If they are not yet attached to this release, check back shortly or see [all releases](https://github.com/shimondoodkin/light-blue-tts-sapi/releases).

            ---

            ### CPU-Only Install (simplest)

            1. Download and run **LightBlue-TTS-Setup.exe**
            2. Download and run **LightBlue-TTS-Models.exe**
            3. Done! Select a "LightBlueTTS" voice in Windows speech settings.

            ### GPU Install (CUDA / TensorRT)

            For faster synthesis on NVIDIA GPUs:

            1. Install CUDA 12 and cuDNN 9:
               ```
               winget install Nvidia.CUDA --version 12.9
               ```
               Download cuDNN 9 from [cuDNN Archive](https://developer.nvidia.com/cudnn-archive) (winget not available for cuDNN).
               Or get CUDA manually from [CUDA Toolkit Archive](https://developer.nvidia.com/cuda-toolkit-archive).
            2. Download and run **LightBlue-TTS-Setup.exe** (install the app first)
            3. Download and run **LightBlue-TTS-Models.exe** (installs into the app folder)
            4. Download and run **LightBlue-TTS-ORT-GPU.exe** (overwrites CPU onnxruntime.dll with GPU version — must be installed after the app setup)
            5. Select a "GPU" voice variant in Windows speech settings.

            ---

            ### Voice Variants

            Each voice (male "Shaul" / female "Rotem") has multiple quality presets:
            - **4 steps** — fastest, lower quality (CPU only)
            - **8 steps** — good balance
            - **32 steps** — high quality
            - **64 steps** — best quality, slowest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
