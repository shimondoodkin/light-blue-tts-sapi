name: Release Models

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the asset to (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  models:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download models from HuggingFace
        shell: bash
        run: python scripts/download_models.py --force

      - name: Install Python dependencies
        run: pip install onnx onnxsim numpy

      - name: Backbone surgery
        shell: bash
        run: |
          cp models/backbone_keys.onnx models/backbone_keys_orig.onnx
          python scripts/backbone_surgery.py models/backbone_keys_orig.onnx models/backbone_keys.onnx
          rm models/backbone_keys_orig.onnx

      - name: Simplify models with onnxsim
        run: python scripts/simplify_models_in_place.py

      - name: Create models ZIP
        shell: bash
        run: |
          mkdir -p target/installer
          cd models
          7z a -tzip ../target/installer/LightBlue-TTS-SAPI-Models.zip .

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS models installer
        shell: cmd
        working-directory: installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" setup-models.nsi

      - name: Upload models ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightBlue-TTS-SAPI-Models-ZIP
          path: target/installer/LightBlue-TTS-SAPI-Models.zip

      - name: Upload models installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightBlue-TTS-SAPI-Models
          path: target/installer/LightBlue-TTS-SAPI-Models.exe

      - name: Upload to GitHub Release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            target/installer/LightBlue-TTS-SAPI-Models.exe
            target/installer/LightBlue-TTS-SAPI-Models.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
